apiVersion: v1
kind: Service
metadata:
  name: agent-comm-bus
  namespace: ac-infra
  labels:
    app: agent-comm-bus
spec:
  type: ClusterIP
  selector:
    app: agent-comm-bus
  ports:
    - name: ws
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bus-traffic
  namespace: ac-infra
spec:
  podSelector:
    matchLabels:
      app: agent-comm-bus
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ac-infra
      ports:
        - port: 8080
          protocol: TCP